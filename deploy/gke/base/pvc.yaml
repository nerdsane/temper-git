# PersistentVolumeClaim for temper-git's libSQL store.
#
# v0: single 10 GiB gp3 volume holding agents.db + per-repo libSQL
# files. Enough for dozens of small repos while we validate the
# deploy shape.
#
# When ADR-0004 verification lands and we flip to bottomless (GCS-
# backed WAL), this PVC shrinks to a warm-cache volume (the WAL is
# externalised, so ephemeral-friendly) and the sizing argument moves
# to the GCS bucket instead.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: temper-git-data
  namespace: temper-git
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard-rwo
