# Kubernetes ServiceAccount for the temper-git pod.
#
# Not bound to any Google Service Account via Workload Identity in
# the base overlay — v0 stores state in a local libSQL file on a
# PVC and does not reach out to GCP APIs. When ADR-0004's GCS-backed
# WAL lands, add a workload-identity.io/google-service-account
# annotation pointing at a temper-git-gsa@darkhelix-sandbox.iam
# GSA with the minimum GCS roles for its bottomless bucket.
#
# Deliberately distinct from dark-helix's platform-ksa: temper-git's
# blast radius must not intersect the factory's.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: temper-git-ksa
  namespace: temper-git
