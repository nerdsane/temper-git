# Internal ClusterIP Service. dark-helix reaches temper-git at
# `temper-git.temper-git.svc.cluster.local:3000`.
#
# Intentionally NOT exposed via Ingress. External access, if needed,
# comes through `kubectl port-forward` or through a subsequent ADR
# that gates public exposure (auth, rate limits, etc.).
apiVersion: v1
kind: Service
metadata:
  name: temper-git
  namespace: temper-git
  labels:
    app: temper-git
spec:
  type: ClusterIP
  selector:
    app: temper-git
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
