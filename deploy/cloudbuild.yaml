# Cloud Build config for temper-git.
#
# Submit from the temper-git repo root:
#
#   gcloud builds submit \
#     --config deploy/cloudbuild.yaml \
#     --substitutions=_TAG=v0.1.0-phase1 \
#     .
#
# Tags are of the form `vMAJ.MIN.PATCH-<phase>` where phase tracks
# RFC-0001 delivery milestones (phase1 = specs+CSDL+Cedar landed,
# dispatch stubbed; phase2 = K-1 + K-2 wired; phase3 = smart-HTTP
# working end-to-end; v1.0 = full REST + GraphQL).

substitutions:
  _TAG: v0.1.0-phase1
  _REPO: us-central1-docker.pkg.dev/darkhelix-sandbox/darkhelix

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --network
      - cloudbuild
      - --file
      - deploy/Dockerfile
      - --tag
      - ${_REPO}/temper-git:${_TAG}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REPO}/temper-git:${_TAG}

images:
  - ${_REPO}/temper-git:${_TAG}

timeout: 1800s

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
