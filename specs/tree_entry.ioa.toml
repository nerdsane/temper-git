# TreeEntry — one entry of a git tree.
#
# A child of Tree. One row per (Tree, Path) pair. Paths are single
# path components (no slashes) because git trees nest; subdirectories
# are references to other trees via `Mode=Tree` and `ObjectSha=<tree_sha>`.
#
# Id is a UUIDv7 rather than a hash, because the same (Path, Mode,
# ObjectSha) triple can appear in many trees and we don't deduplicate
# the TreeEntry rows (each tree owns its entries). The canonical tree
# bytes are computed from these rows at serialize time.
#
# Immutable after creation; `sort_entries` in tg-canonical enforces
# canonical ordering at tree-hash time.

[automaton]
name = "TreeEntry"
states = ["Durable"]
initial = "Durable"

[[invariant]]
name = "DurableIsFinal"
when = ["Durable"]
assert = "no_further_transitions"
