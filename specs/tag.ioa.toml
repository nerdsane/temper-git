# Tag — git annotated-tag object.
#
# Lightweight tags (a Ref pointing directly at a commit) are not
# represented here; they're just Ref rows with `Kind=tag`. This
# entity covers annotated tags only — those that have their own
# tag-object with tagger, message, and optional signature.
#
# Id = SHA-1 hex of canonical tag bytes (see `canonical/src/tag.rs`).
# Immutable.
#
# Target is the tagged object (typically a Commit; can be any object
# type per git's rules — even another tag).

[automaton]
name = "Tag"
states = ["Durable"]
initial = "Durable"
allow_indefinite_states = ["Durable"]

[[state]]
name = "Tagger"
type = "string"
initial = ""
query_indexed = false

[[state]]
name = "Message"
type = "string"
initial = ""
query_indexed = false

[[state]]
name = "PgpSignature"
type = "string"
initial = ""
query_indexed = false

[[state]]
name = "CanonicalBytes"
type = "string"
initial = ""
query_indexed = false

[[state]]
name = "CreatedAt"
type = "string"
initial = ""
query_indexed = false

# --- Actions ---
# Immutable by omission. Cedar denies PATCH/DELETE.

[[action]]
name = "Create"
kind = "input"
from = ["Durable"]
params = ["repository_id", "target_sha", "target_type", "tag_name", "tagger", "message", "pgp_signature", "canonical_bytes"]
hint = "Record an annotated tag. Id must equal the SHA-1 of canonical_bytes."
