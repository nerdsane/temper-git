# Repository — the umbrella entity for a git repo hosted on temper-git.
#
# The Repository row carries metadata and provisioning state for the
# repo's storage. A `repository_provision` WASM integration fires on
# `Create` to do any backend-specific setup the kernel needs.
#
# State machine:
#
#   Provisioning ─(MarkProvisioned)─▶ Active ─(Archive)─▶ Archived
#                                       │ ▲
#                                       │ │
#                                     WriteFile/DeleteFile/
#                                     BatchWriteFiles/
#                                     CreateBranch/
#                                     MergePullRequest/
#                                     SetDefaultBranch
#                                     (all self-loop on Active)
#
# Archived is terminal. Rationale: once a repo is archived, history
# is frozen; re-activation is a manual admin operation outside the
# state machine (delete + re-create with restore).

[automaton]
name = "Repository"
states = ["Provisioning", "Active", "Archived"]
initial = "Provisioning"
allow_indefinite_states = ["Provisioning", "Active"]

# --- Actions ---

[[action]]
name = "Create"
kind = "input"
from = ["Provisioning"]
to = "Provisioning"
params = ["OwnerAccountId", "Name", "Description", "DefaultBranch", "Visibility"]
hint = "Seed the Repository row. Fires the repository_provision integration which creates the per-repo libSQL DB and then advances to Active via MarkProvisioned."

[[action]]
name = "MarkProvisioned"
kind = "input"
from = ["Provisioning"]
to = "Active"
params = ["LibsqlDbName"]
hint = "Callback from repository_provision once the per-repo DB is ready. Backfills LibsqlDbName and transitions to Active."

[[action]]
name = "SetDefaultBranch"
kind = "input"
from = ["Active"]
to = "Active"
params = ["DefaultBranch"]
hint = "Change the repo's default branch. Must reference an existing Ref."

[[action]]
name = "WriteFile"
kind = "input"
from = ["Active"]
to = "Active"
params = ["Ref", "Path", "Content", "Mode", "Message", "Author", "ClientRequestId"]
hint = "Create or update one file. Fires a scm_write_file integration which walks the Ref's current Tree, builds a new Tree with the file changed, writes the Commit, and advances the Ref. Atomic transaction on the repo's libSQL DB."
effect = [{ type = "trigger", name = "scm_write_file" }]

[[action]]
name = "DeleteFile"
kind = "input"
from = ["Active"]
to = "Active"
params = ["Ref", "Path", "Message", "Author", "ClientRequestId"]
hint = "Delete one file from a Ref's current Tree. Same atomicity as WriteFile."
effect = [{ type = "trigger", name = "scm_write_file" }]

[[action]]
name = "BatchWriteFiles"
kind = "input"
from = ["Active"]
to = "Active"
params = ["Ref", "Changes", "Message", "Author", "ClientRequestId"]
hint = "Atomic multi-file commit. Changes is a JSON array of {Op:'write'|'delete', Path, Content?, Mode?}."
effect = [{ type = "trigger", name = "scm_write_file" }]

[[action]]
name = "CreateBranch"
kind = "input"
from = ["Active"]
to = "Active"
params = ["FromRef", "NewRef"]
hint = "Create a new Ref pointing at the same commit as FromRef."

[[action]]
name = "MergePullRequest"
kind = "input"
from = ["Active"]
to = "Active"
params = ["PullRequestId", "Strategy", "Message", "ClientRequestId"]
hint = "Apply a PullRequest's source_ref onto target_ref. Strategy is one of merge, squash, rebase. Emits a MergedCommit + advances target_ref."
effect = [{ type = "trigger", name = "scm_merge_pr" }]

[[action]]
name = "IngestPack"
kind = "Composite"
from = ["Active"]
to = "Active"
params = ["PackBytes", "RefUpdates", "ClientRequestId"]
record_parent_event = false
hint = "Ingest a git receive-pack payload as one governed intent: objects, ref CAS updates, and PR-head updates land atomically."
effect = [{ type = "trigger", name = "scm_ingest_pack" }]

[[action.cedar_gate]]
principal = "request.principal"
resource = "this"
action = "Repository::IngestPack"

[[action.sub_writes]]
target_entity = "Blob"
action = "Create"
generated_from = "pack_bytes"

[[action.sub_writes]]
target_entity = "Tree"
action = "Create"
generated_from = "pack_bytes"

[[action.sub_writes]]
target_entity = "Commit"
action = "Create"
generated_from = "pack_bytes"

[[action.sub_writes]]
target_entity = "Tag"
action = "Create"
generated_from = "pack_bytes"

[[action.sub_writes]]
target_entity = "Ref"
action = "Create"
generated_from = "ref_updates"

[[action.sub_writes]]
target_entity = "Ref"
action = "Update"
generated_from = "ref_updates"

[[action.sub_writes]]
target_entity = "Ref"
action = "Delete"
generated_from = "ref_updates"

[[action.sub_writes]]
target_entity = "PullRequest"
action = "UpdateHead"
generated_from = "ref_updates"

[[action]]
name = "Archive"
kind = "input"
from = ["Active"]
to = "Archived"
hint = "Archive the repository. History is preserved but no further mutations are accepted. Terminal state."

# --- Output events ---

[[action]]
name = "CommitCreated"
kind = "output"
hint = "Emitted when a new Commit row is written under this repo."

[[action]]
name = "RefUpdated"
kind = "output"
hint = "Emitted when a Ref's TargetCommitSha changes."

[[action]]
name = "RepositoryProvisionedEvent"
kind = "output"
hint = "Emitted when the per-repo libSQL DB is ready and the entity is Active."

[[action]]
name = "RepositoryArchivedEvent"
kind = "output"
hint = "Emitted on Archive."

# --- Safety invariants ---

[[invariant]]
name = "ArchivedIsFinal"
when = ["Archived"]
assert = "no_further_transitions"

[[integration]]
name = "repository_provision"
trigger = "repository_provision"
type = "wasm"
module = "repository_provision"
on_success = "MarkProvisioned"
on_failure = "Archive"

[integration.config]
timeout_secs = 30

[[integration]]
name = "scm_write_file"
trigger = "scm_write_file"
type = "wasm"
module = "scm_write_file"

[integration.config]
timeout_secs = 60

[[integration]]
name = "scm_merge_pr"
trigger = "scm_merge_pr"
type = "wasm"
module = "scm_merge_pr"

[integration.config]
timeout_secs = 120

[[integration]]
name = "scm_ingest_pack"
trigger = "scm_ingest_pack"
type = "wasm"
module = "scm_ingest_pack"

[integration.config]
timeout_secs = 120
